services:
  - type: web
    name: devcoach-mvp
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_NAME
        value: DevCoach MVP
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"
